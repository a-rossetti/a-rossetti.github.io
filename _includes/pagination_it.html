<div class="row">
  <div class="col col-12">
    <div class="pagination">
      <ul class="pagination-list list-reset">
        {% if paginator.previous_page %}
          {% if paginator.previous_page == 1 %}
            <li class="previous-posts">
              <a class="previous-link" href="{{ site.baseurl }}/it/">
                <i class="ion ion-ios-arrow-back"></i> Articoli precedenti
              </a>
            </li>
          {% else %}
            <li class="newer-posts">
              <a class="newer-link" href="{{ paginator.previous_page_path }}">
                <i class="ion ion-ios-arrow-back"></i> Articoli più recenti
              </a>
            </li>
          {% endif %}
        {% endif %}

        {% if paginator.next_page %}
          <li class="older-posts">
            <a class="older-link" href="{{ paginator.next_page_path }}">
              Altri articoli <i class="ion ion-ios-arrow-forward"></i>
            </a>
          </li>
        {% endif %}
      </ul>
    </div> <!-- /.pagination -->
  </div>
</div>
