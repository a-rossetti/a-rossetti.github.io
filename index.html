<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Open Graph and Twitter Card meta tags for link preview -->
    <meta property="og:title" content="Andrea Rossetti" />
    <meta property="og:description" content="X" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thethirdrealm.org/" />
    <meta property="og:image" content="https://thethirdrealm.org/img/thethirdrealm.png" />
<!--
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Andrea Rossetti">
    <meta name="twitter:description" content="X">
    <meta name="twitter:image" content="https://thethirdrealm.org/img/thethirdrealm.png">
-->
    <!-- Redirect tag -->
    <script>
        // Only redirect if it's not a bot
        if (!/bot|googlebot|crawler|spider|robot|crawling/i.test(navigator.userAgent)) {
          window.location.href = "/en/";
        }
      </script>
</head>
<body>
    If you are not redirected, <a href="/en/">click here</a> to visit the English homepage.
</body>
</html>
