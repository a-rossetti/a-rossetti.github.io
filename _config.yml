#-------------------------------
# General Site Settings

title: The Third Realm
description:  # this means to ignore newlines until "baseurl:"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://thethirdrealm.org/" # the base hostname & protocol for your site, e.g. http://example.com


#-------------------------------
# About Section
authors:
  andrea:
    author-name:   Andrea Rossetti
    author-avatar: andrea-author-avatar.jpg


#-------------------------------
# Contact links
x:          https://www.x.com/the_third_realm # X
instagram:  https://www.instagram.com/the.third.realm/ # Instagram
email:      thethirdrealm1@gmail.com # Email


#-------------------------------
# Comment Section (Disqus)
disqus-identifier: # Add your shortname for Disqus Comment. For example mr-brown


#-------------------------------
# Instagram Feed
instafeed: false # To enable the instafeed, use the value true. To turn off use the value false.


#-------------------------------
# X feed
xfeed: true
x-username: "a_rossetti_"


#-------------------------------
# Google Analytics
google-analytics: # Add your identifier. For example UA-99631805-1.


#-------------------------------
# Newsletter
mailchimp: github.us14.list-manage.com/subscribe/post?u=b361008367347aeefa28dbec8&amp;id=bcf1a34f6b&amp;f_id=00edb0e0f0 # Add your MailChimp form identifier


#-------------------------------
# Build settings
markdown: kramdown
permalink: ':title/'
plugins:
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-feed


pagination:
  enabled: true


collections:
  en_posts:
    output: true
    permalink: /en/:path/
  en_pages:
    output: true
    permalink: /en/:path/
  it_posts:
    output: true
    permalink: /it/:path/
  it_pages:
    output: true
    permalink: /it/:path/


sass:
  sass_dir: _sass
  style: compressed

#-------------------------------
