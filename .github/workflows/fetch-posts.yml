name: Fetch X Posts

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch user ID
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
        run: |
          curl -X GET "https://api.twitter.com/2/users/by/username/${{ secrets.X_USERNAME }}" -H "Authorization: Bearer $BEARER_TOKEN" -o user.json
          USER_ID=$(jq -r '.data.id' user.json)
          echo "USER_ID=$USER_ID" >> $GITHUB_ENV

      - name: Fetch posts
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
        run: |
          curl -X GET "https://api.twitter.com/2/users/$USER_ID/tweets" -H "Authorization: Bearer $BEARER_TOKEN" -o _data/tweets.json

      - name: Commit tweets
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/tweets.json
          git commit -m "Fetch latest posts from X"
          git push

